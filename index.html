<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 20 DOM Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="title">Исходный заголовок</h1>
    <p class="text">Это исходный абзац текста.</p>

    <button id="btn">Нажми меня</button>

    <div style="margin-top: 20px;">
        <input type="text" id="nameInput" placeholder="Введите ваше имя">
        <button id="greetBtn">Приветствовать</button>
        <button id="clearBtn">Очистить</button>
        <p id="output"></p>
    </div>

    <form id="userForm" style="margin-top: 30px; border: 1px solid #ccc; padding: 15px;">
        <h2>Регистрация</h2>
        <label>
            Имя: 
            <input type="text" id="formName" required>
        </label>
        <br><br>
        <label>
            Возраст: 
            <input type="text" id="formAge">
        </label>
        <br><br>
        
        <button type="submit">Отправить</button>
    </form>
    
 
    <div id="formOutput" style="margin-top: 10px; font-weight: bold;"></div>

    <script src="main.js"></script>
</body>
</html>
