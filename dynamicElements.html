<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамические элементы</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        ul { list-style-type: none; padding: 0; }
        li { 
            background: #f4f4f4; 
            margin: 5px 0; 
            padding: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        .delete-btn:hover { background: #cc0000; }
        #stats { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Список пользователей</h1>
    
    <input type="text" id="newUserName" placeholder="Имя пользователя">
    <button id="addUserBtn">Добавить пользователя</button>
    
    <ul id="userList"></ul>
    
    <div id="stats"></div>


    <script src="dynamicElements.js"></script>
</body>
</html>
